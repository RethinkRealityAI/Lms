[build]
  # Build command
  command = "npm run build"
  
  # Publish directory (Next.js output - Netlify plugin handles this automatically)
  # publish = ".next"  # Commented out - @netlify/plugin-nextjs handles this

# Build environment variables
[build.environment]
  NODE_VERSION = "22.22.0"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"
  # Exclude email-identifier env vars from secrets scanning. Their values are
  # sender/login email addresses (the public support + from addresses) that
  # legitimately appear in application source (e.g. src/app/api/contact/route.ts,
  # src/lib/tenant/branding.ts, email templates, migration 024) and docs — they
  # are not credentials. Real secrets (SMTP_PASS, SUPABASE_SERVICE_ROLE_KEY,
  # etc.) are intentionally NOT listed here, so they remain scanned.
  SECRETS_SCAN_OMIT_KEYS = "SMTP_USER,SMTP_FROM,SMTP_FROM_GANSID,SMTP_FROM_SCAGO"

# Build plugins
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Note: Netlify automatically caches node_modules and .next/cache
# when using @netlify/plugin-nextjs, so explicit cache config is optional
# but can be added for additional control if needed

# Redirects and rewrites (handled by Next.js middleware, but can add here if needed)
[[redirects]]
  from = "/admin"
  to = "/admin"
  status = 200
  force = false

[[redirects]]
  from = "/student"
  to = "/student"
  status = 200
  force = false

# Headers for security and performance
# NOTE: X-Frame-Options is intentionally NOT set here — it can only express
# DENY/SAMEORIGIN, not a specific allow-listed external origin, and would
# override/conflict with next.config.js's CSP frame-ancestors (which does
# allow-list the SCAGO site as an embed host). Modern browsers honour
# frame-ancestors over X-Frame-Options when both would apply, but Netlify's
# edge-level header here is applied as a static rule regardless of route, so
# leaving DENY in place would still block the embed in browsers that fall
# back to XFO. Framing protection is handled entirely via CSP frame-ancestors.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment-specific settings
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
